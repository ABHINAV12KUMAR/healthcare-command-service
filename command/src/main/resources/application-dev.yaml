server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/command_db
    username: root
    password: admin123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    org.springframework: INFO
    com.healthcare: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE