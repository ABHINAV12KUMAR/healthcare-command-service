server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://idev-db-host:3306/command_db
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:idev-kafka-host:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

logging:
  level:
    org.springframework: INFO
    com.healthcare: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        descriptions: true
        step: 10s
    tags:
      application: ${spring.application.name}
      environment: idev
      region: default
    distribution:
      percentiles-histogram:
        http.server.requests: true
        patient.operations.duration: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        patient.operations.duration: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 500ms, 1s
        patient.operations.duration: 200ms, 500ms, 1s
