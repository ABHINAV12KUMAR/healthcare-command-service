groups:
  - name: healthcare_alerts
    interval: 30s
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          team: healthcare
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second for the last 5 minutes"

      # High latency alert
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: healthcare
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is {{ $value }} seconds"

      # Application down alert
      - alert: ApplicationDown
        expr: up{job="healthcare-command-service"} == 0
        for: 2m
        labels:
          severity: critical
          team: healthcare
        annotations:
          summary: "Application is down"
          description: "Healthcare command service has been down for more than 2 minutes"

      # High memory usage alert
      - alert: HighMemoryUsage
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.9
        for: 5m
        labels:
          severity: warning
          team: healthcare
        annotations:
          summary: "High memory usage"
          description: "Heap memory usage is above 90%"

      # High CPU usage alert
      - alert: HighCpuUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          team: healthcare
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80%"

      # Database connection pool exhaustion
      - alert: DatabaseConnectionPoolExhaustion
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.9
        for: 5m
        labels:
          severity: critical
          team: healthcare
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Connection pool usage is above 90%"

      # Slow patient operations
      - alert: SlowPatientOperations
        expr: histogram_quantile(0.95, rate(patient_operations_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          team: healthcare
        annotations:
          summary: "Slow patient operations detected"
          description: "95th percentile of patient operations is above 2 seconds"
